name: Update profile metrics

on:
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate public metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: emanuwells
        run: node scripts/generate-profile-metrics.mjs

      - name: Commit changed snapshot
        run: |
          if git diff --quiet -- .github/assets/profile-metrics.svg; then
            echo "Metrics are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/profile-metrics.svg
          git commit -m "chore: refresh public profile metrics"
          git push

